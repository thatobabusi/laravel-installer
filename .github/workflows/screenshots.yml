name: Sync screenshots

on:
  push:
    branches: [master, '*.x']
    paths:
      - 'src/Web/**'
      - 'tests/E2E/screenshots.spec.ts'
      - '.github/workflows/screenshots.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: true

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-interaction --no-progress
          npm ci
          npx playwright install --with-deps chromium

      - name: Regenerate documentation screenshots
        run: npm run docs:screenshots

      - name: Commit screenshot drift
        run: |
          if git diff --quiet -- docs/images && [ -z "$(git status --porcelain docs/images)" ]; then
            echo "Screenshots are already in sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/images
          git commit -m "chore: sync documentation screenshots [skip ci]"
          git push
