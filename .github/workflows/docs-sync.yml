name: Sync documentation

on:
  push:
    branches:
      - master
      - '*.x'
    paths:
      - 'bin/laravel'
      - 'src/**'
      - 'scripts/sync-docs.php'
      - '.github/workflows/docs-sync.yml'
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: true

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Regenerate command documentation
        run: composer docs:update

      - name: Commit documentation drift
        run: |
          if git diff --quiet -- docs/reference; then
            echo "Generated documentation is already in sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/reference
          git commit -m "chore: sync command documentation [skip ci]"
          git push

      - name: Verify generated documentation
        run: composer docs:check